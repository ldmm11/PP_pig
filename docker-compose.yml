services:
  db:
    image: mysql:8.0
    container_name: emotion-chat-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: emotion_chat
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: emotion-chat-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql+aiomysql://root:1234@db:3306/emotion_chat?charset=utf8mb4"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_BASE: "https://api.deepseek.com"
      DEEPSEEK_MODEL: "deepseek-chat"
      HOST: "0.0.0.0"
      PORT: "8002"
    ports:
      - "8002:8002"

  frontend:
    build:
      context: ./frontend
    container_name: emotion-chat-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
